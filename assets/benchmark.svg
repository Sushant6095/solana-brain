<svg xmlns="http://www.w3.org/2000/svg" width="900" height="524" viewBox="0 0 900 524" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Benchmark: same base model with vs without solana-brain. Answer quality — with-skill 9.13 vs without 8.70, winning all five dimensions. Memory continuity — with-skill 9.75 vs without 3.13, a 3.1x gap. Averaged over two blind-judged runs.">
  <defs>
    <linearGradient id="bm-sol" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/></linearGradient>
    <linearGradient id="bm-fill" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9945FF" stop-opacity="0.35"/><stop offset="1" stop-color="#14F195" stop-opacity="0.35"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="898" height="522" rx="16" fill="#0b0e13" stroke="#21262d"/>

  <!-- header -->
  <text x="40" y="42" fill="#e6edf3" font-size="18" font-weight="800">Benchmark — same model, with vs without solana-brain</text>
  <text x="40" y="64" fill="#8b949e" font-size="12.5">Blind-judged, 0–10, averaged over 2 runs (8 quality + 8 memory task-scores per side). Same base LLM; only the skill varies.</text>
  <!-- legend -->
  <rect x="612" y="30" width="14" height="14" rx="3" fill="#6e7681"/><text x="631" y="42" fill="#8b949e" font-size="12">without</text>
  <rect x="706" y="30" width="14" height="14" rx="3" fill="url(#bm-sol)"/><text x="725" y="42" fill="#c9d1d9" font-size="12">with skill</text>

  <!-- ===== LEFT: quality radar (center 250,300 R130) ===== -->
  <g stroke="#21262d" fill="none">
    <polygon points="250,170 373.6,259.8 326.4,405.2 173.6,405.2 126.4,259.8"/>
    <polygon points="250,222 324.2,275.9 295.9,363.1 204.1,363.1 175.8,275.9"/>
    <polygon points="250,274 274.7,292 265.3,321 234.7,321 225.3,292"/>
    <line x1="250" y1="300" x2="250" y2="170"/><line x1="250" y1="300" x2="373.6" y2="259.8"/>
    <line x1="250" y1="300" x2="326.4" y2="405.2"/><line x1="250" y1="300" x2="173.6" y2="405.2"/>
    <line x1="250" y1="300" x2="126.4" y2="259.8"/>
  </g>
  <!-- control polygon -->
  <polygon points="250,186.25 352.0,266.9 320.7,397.3 188.8,384.1 135.6,262.8" fill="#6e7681" fill-opacity="0.22" stroke="#8b949e" stroke-width="1.5"/>
  <!-- treatment polygon -->
  <polygon points="250,183 359.7,264.3 322.6,399.9 181.2,394.7 135.6,262.8" fill="url(#bm-fill)" stroke="#14F195" stroke-width="2"/>
  <g fill="#14F195"><circle cx="250" cy="183" r="3"/><circle cx="359.7" cy="264.3" r="3"/><circle cx="322.6" cy="399.9" r="3"/><circle cx="181.2" cy="394.7" r="3"/><circle cx="135.6" cy="262.8" r="3"/></g>
  <!-- axis labels -->
  <g fill="#8b949e" font-size="11.5">
    <text x="250" y="140" text-anchor="middle">Correctness</text>
    <text x="398" y="250" text-anchor="start">Completeness</text>
    <text x="346" y="426" text-anchor="start">Gate-discipline</text>
    <text x="156" y="426" text-anchor="end">Actionability</text>
    <text x="104" y="250" text-anchor="end">Safety</text>
  </g>
  <text x="250" y="478" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Answer quality</text>
  <text x="250" y="498" text-anchor="middle" fill="#8b949e" font-size="12">with <tspan fill="#14F195" font-weight="700">9.13</tspan> · without 8.70 — wins all five dimensions</text>

  <!-- ===== RIGHT: memory continuity bars ===== -->
  <g stroke="#21262d"><line x1="560" y1="420" x2="850" y2="420"/><line x1="560" y1="305" x2="850" y2="305"/><line x1="560" y1="190" x2="850" y2="190"/></g>
  <g fill="#6e7681" font-size="11" text-anchor="end"><text x="552" y="424">0</text><text x="552" y="309">5</text><text x="552" y="194">10</text></g>
  <rect x="600" y="348" width="85" height="72" rx="4" fill="#6e7681"/>
  <text x="642" y="336" text-anchor="middle" fill="#c9d1d9" font-size="18" font-weight="700">3.13</text>
  <text x="642" y="440" text-anchor="middle" fill="#8b949e" font-size="12">without</text>
  <rect x="730" y="195.75" width="85" height="224.25" rx="4" fill="url(#bm-sol)"/>
  <text x="772" y="184" text-anchor="middle" fill="#14F195" font-size="18" font-weight="800">9.75</text>
  <text x="772" y="440" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="600">with skill</text>
  <text x="705" y="478" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="700">Memory continuity</text>
  <text x="705" y="498" text-anchor="middle" fill="#b692ff" font-size="12" font-weight="700">3.1× — recalls your project's decisions, every session</text>
</svg>
