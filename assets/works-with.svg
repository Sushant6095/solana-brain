<svg xmlns="http://www.w3.org/2000/svg" width="900" height="584" viewBox="0 0 900 584" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Works with every agent: Claude Code natively; Codex, Cursor, Cline, Windsurf, Roo Code, Kilo Code, Gemini CLI, Copilot CLI, Aider, Goose via CLAUDE.md or AGENTS.md; any other LLM (GPT, Gemini, Llama, Claude Desktop, Warp) by pointing it at SKILL.md">
  <defs>
    <linearGradient id="ww-sol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="898" height="582" rx="16" fill="#0b0e13" stroke="#21262d"/>

  <!-- header chip -->
  <rect x="26" y="22" width="330" height="48" rx="10" fill="#eef1f5"/>
  <rect x="26" y="22" width="7" height="48" rx="3" fill="url(#ww-sol)"/>
  <text x="48" y="46" fill="#0d1117" font-size="13" font-weight="800" letter-spacing="1.5">WORKS WITH EVERY AGENT</text>
  <text x="48" y="62" fill="#57606a" font-size="10.5" font-weight="600">14 agents · one markdown skill · no MCP, no hooks</text>

  <text x="28" y="100" fill="#c9d1d9" font-size="13">Any agent that reads <tspan fill="#e6edf3" font-weight="700">CLAUDE.md</tspan> / <tspan fill="#e6edf3" font-weight="700">AGENTS.md</tspan> — or point any LLM at <tspan fill="#b692ff" font-weight="700">SKILL.md</tspan>. Claude Code is wired natively.</text>

  <!-- legend -->
  <circle cx="32" cy="128" r="5" fill="#14F195"/><text x="44" y="132" fill="#8b949e" font-size="11.5">native</text>
  <circle cx="120" cy="128" r="5" fill="#9945FF"/><text x="132" y="132" fill="#8b949e" font-size="11.5">CLAUDE.md / AGENTS.md</text>
  <circle cx="320" cy="128" r="5" fill="#6e7681"/><text x="332" y="132" fill="#8b949e" font-size="11.5">point at SKILL.md</text>

