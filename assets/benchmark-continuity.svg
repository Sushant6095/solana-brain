<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340" viewBox="0 0 620 340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Memory continuity benchmark: without solana-brain 3.5 out of 10, with solana-brain 9.0 out of 10">
  <defs>
    <linearGradient id="bc-sol" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="618" height="338" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="28" y="40" fill="#e6edf3" font-size="18" font-weight="700">Memory continuity — does it recall your project's decisions?</text>
  <text x="28" y="62" fill="#8b949e" font-size="12.5">Blind judge, 0–10. Follow-up tasks inside a project with established prior decisions.</text>

  <!-- y gridlines -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="120" y1="270" x2="560" y2="270"/>
    <line x1="120" y1="170" x2="560" y2="170"/>
    <line x1="120" y1="70" x2="560" y2="70"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="110" y="274">0</text><text x="110" y="174">5</text><text x="110" y="74">10</text>
  </g>

  <!-- without -->
  <rect x="160" y="200" width="120" height="70" rx="4" fill="#6e7681"/>
  <text x="220" y="190" fill="#c9d1d9" font-size="20" font-weight="700" text-anchor="middle">3.5</text>
  <text x="220" y="292" fill="#8b949e" font-size="13" text-anchor="middle">without solana-brain</text>

  <!-- with -->
  <rect x="380" y="90" width="120" height="180" rx="4" fill="url(#bc-sol)"/>
  <text x="440" y="80" fill="#14F195" font-size="20" font-weight="800" text-anchor="middle">9.0</text>
  <text x="440" y="292" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">with solana-brain</text>

  <text x="310" y="322" fill="#b692ff" font-size="13" font-weight="700" text-anchor="middle">2.6× — recalls Anchor · OtterSec policy · Squads 3-of-5 · Helius · entity</text>
</svg>
