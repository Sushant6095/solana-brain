<svg xmlns="http://www.w3.org/2000/svg" width="760" height="384" viewBox="0 0 760 384" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Answer quality under pressure: solana-brain at parity with the base model across five dimensions, both around 8 to 9 out of 10">
  <defs>
    <linearGradient id="bq-sol" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#9945FF"/><stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="758" height="382" rx="14" fill="#0d1117" stroke="#30363d"/>
  <text x="28" y="38" fill="#e6edf3" font-size="18" font-weight="700">Answer quality under pressure — parity with an already-expert model</text>
  <text x="28" y="59" fill="#8b949e" font-size="12.5">Blind judge, 0–10, 4 gate-trap / orchestration / depth tasks. Overall: without 8.75 · with 8.55.</text>

  <!-- legend -->
  <rect x="556" y="30" width="14" height="14" rx="3" fill="#6e7681"/>
  <text x="575" y="42" fill="#8b949e" font-size="12">without</text>
  <rect x="640" y="30" width="14" height="14" rx="3" fill="url(#bq-sol)"/>
  <text x="659" y="42" fill="#c9d1d9" font-size="12">with skill</text>

  <!-- gridlines + y labels (0..10 at y=300..70, 23px/unit) -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="66" y1="300" x2="744" y2="300"/><line x1="66" y1="254" x2="744" y2="254"/>
    <line x1="66" y1="208" x2="744" y2="208"/><line x1="66" y1="162" x2="744" y2="162"/>
    <line x1="66" y1="116" x2="744" y2="116"/><line x1="66" y1="70" x2="744" y2="70"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="58" y="304">0</text><text x="58" y="258">2</text><text x="58" y="212">4</text>
    <text x="58" y="166">6</text><text x="58" y="120">8</text><text x="58" y="74">10</text>
  </g>

  <!-- bars: control (gray) + treatment (gradient). h = value*23, top = 300-h -->
  <g>
    <!-- correctness 9.0 / 9.0 -->
    <rect x="104" y="93" width="30" height="207" fill="#6e7681"/><rect x="140" y="93" width="30" height="207" fill="url(#bq-sol)"/>
    <text x="119" y="86" fill="#8b949e" font-size="10.5" text-anchor="middle">9.0</text><text x="155" y="86" fill="#c9d1d9" font-size="10.5" text-anchor="middle">9.0</text>
    <!-- completeness 8.75 / 8.25 -->
    <rect x="238" y="98.75" width="30" height="201.25" fill="#6e7681"/><rect x="274" y="110.25" width="30" height="189.75" fill="url(#bq-sol)"/>
    <text x="253" y="92" fill="#8b949e" font-size="10.5" text-anchor="middle">8.8</text><text x="289" y="103" fill="#c9d1d9" font-size="10.5" text-anchor="middle">8.3</text>
    <!-- gate_discipline 8.75 / 8.75 -->
    <rect x="372" y="98.75" width="30" height="201.25" fill="#6e7681"/><rect x="408" y="98.75" width="30" height="201.25" fill="url(#bq-sol)"/>
    <text x="387" y="92" fill="#8b949e" font-size="10.5" text-anchor="middle">8.8</text><text x="423" y="92" fill="#c9d1d9" font-size="10.5" text-anchor="middle">8.8</text>
    <!-- actionability 8.25 / 7.75 -->
    <rect x="506" y="110.25" width="30" height="189.75" fill="#6e7681"/><rect x="542" y="121.75" width="30" height="178.25" fill="url(#bq-sol)"/>
    <text x="521" y="103" fill="#8b949e" font-size="10.5" text-anchor="middle">8.3</text><text x="557" y="114" fill="#c9d1d9" font-size="10.5" text-anchor="middle">7.8</text>
    <!-- safety_honesty 9.0 / 9.0 -->
    <rect x="640" y="93" width="30" height="207" fill="#6e7681"/><rect x="676" y="93" width="30" height="207" fill="url(#bq-sol)"/>
    <text x="655" y="86" fill="#8b949e" font-size="10.5" text-anchor="middle">9.0</text><text x="691" y="86" fill="#c9d1d9" font-size="10.5" text-anchor="middle">9.0</text>
  </g>

  <!-- group labels -->
  <g fill="#8b949e" font-size="12" text-anchor="middle">
    <text x="137" y="320">Correctness</text><text x="271" y="320">Completeness</text>
    <text x="405" y="320">Gates</text><text x="539" y="320">Actionability</text><text x="673" y="320">Safety</text>
  </g>
  <text x="405" y="358" fill="#8b949e" font-size="12" text-anchor="middle" font-style="italic">Both excellent and tied on gate-discipline — the skill's edge is memory (see continuity chart), not raw answers.</text>
</svg>
